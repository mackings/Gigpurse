services:
  - type: web
    name: Gigpurse server
    runtime: go
    plan: free
    buildCommand: go build -o bin/gigpurse ./cmd/gigpurse
    startCommand: ./bin/gigpurse
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: gigpurse
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOW_ADMIN_SIGNUP
        value: "false"

services:
  - type: web
    name: Gigpurse server
    runtime: go
    plan: free
    buildCommand: cd backend && go build -o ../bin/gigpurse ./cmd/gigpurse
    startCommand: ./bin/gigpurse
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: gigpurse
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOW_ADMIN_SIGNUP
        value: "false"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: MAILJET_API_KEY
        sync: false
      - key: MAILJET_API_SECRET
        sync: false
      - key: MAILJET_FROM_EMAIL
        value: Info@decodeanalytical.com
      - key: MAILJET_FROM_NAME
        value: Gigpurse
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: House of GLAME <noreply@decodeanalytical.com>
      - key: PUBLIC_BASE_URL
        sync: false
      - key: MEDIA_UPLOAD_DIR
        value: uploads
